name: NOMOS Whitepaper Validator

on:
  push:
    paths: ['whitepapers/**.md']
  pull_request:
    paths: ['whitepapers/**.md']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown-it-py pymarkdownlnt requests

      - name: Run NOMOS Validator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}  # Your Hugging Face token
        run: |
          python nomos_validator.py whitepapers/*.md > legal_safety_report.md

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-safety-report
          path: legal_safety_report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('legal_safety_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `NOMOS Validation Report:\n\n${report.slice(0, 2000)}... (Full report in artifact)`
            });